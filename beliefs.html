<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Belief Code Scan</title>

  <style>
    :root{
      --bg1:#050a1f;
      --bg2:#060b22;

      --pink:#ff5bd6;
      --pink2:#ff9ae9;

      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.70);

      --card:rgba(0,0,0,.22);
      --stroke:rgba(255,255,255,.12);

      --shadow:0 24px 80px rgba(0,0,0,.55);
      --r:28px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;

      --blueOutline: rgba(120, 205, 255, .60);
      --blueGlow: rgba(120, 205, 255, .16);
    }

    .beliefScanPage, .beliefScanPage *{ box-sizing:border-box; }
    .beliefScanPage{
      min-height:100vh;
      position:relative;
      overflow:hidden;
      font-family:var(--font);
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(255,91,214,.08), transparent 55%),
        radial-gradient(900px 600px at 80% 20%, rgba(255,154,233,.06), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    /* ✅ lighter rain */
    #matrix{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      pointer-events:none;
      opacity:.16; /* was .34 */
    }

    .vignette{
      position:fixed;
      inset:0;
      z-index:1;
      pointer-events:none;
      background: radial-gradient(80% 60% at 50% 40%, transparent 0%, rgba(0,0,0,.35) 70%, rgba(0,0,0,.60) 100%);
    }

    .wrap{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:28px 16px 44px;
    }

    .shell{
      width:min(900px, 100%);
      border-radius: var(--r);
      padding:18px;
      background: rgba(255,255,255,.06);
      border:1px solid var(--stroke);
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .shell::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(600px 180px at 20% 0%, rgba(255,91,214,.16), transparent 55%),
        radial-gradient(600px 200px at 80% 10%, rgba(255,154,233,.12), transparent 60%);
      filter: blur(10px);
      opacity:.45;
      pointer-events:none;
    }

    header{
      position:relative;
      display:flex;
      gap:14px;
      align-items:flex-start;
      justify-content:space-between;
      padding:16px 16px 6px;
    }

    h1{
      margin:0;
      font-size: clamp(22px, 2.6vw, 32px);
      line-height:1.12;
      letter-spacing:.2px;
      color: var(--pink);
      text-shadow: 0 0 22px rgba(255,91,214,.18);
    }

    .sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      max-width: 680px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      font-size:13px;
      user-select:none;
      white-space:nowrap;
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--pink);
      box-shadow:0 0 18px rgba(255,91,214,.85);
    }

    .content{ position:relative; padding:12px 16px 18px; }
    .card{
      border-radius:22px;
      background: var(--card);
      border:1px solid rgba(255,255,255,.10);
      padding:18px;
    }

    .progress{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .bar{
      flex:1;
      height:10px;
      border-radius:999px;
      background: rgba(255,255,255,.08);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
    }
    .bar > div{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(255,91,214,.9), rgba(255,154,233,.85));
      border-radius:999px;
      transition: width .35s ease;
    }
    .count{
      font-size:13px;
      color: rgba(255,255,255,.80);
      min-width:92px;
      text-align:right;
    }

    .q{
      margin-top:6px;
      font-size: clamp(18px, 2.2vw, 26px);
      line-height:1.25;
    }
    .hint{
      margin-top:10px;
      color: var(--muted);
      font-size:13px;
    }

    .answers{ margin-top:14px; display:grid; gap:10px; }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:14px;
      text-align:left;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.085);
      border-color: rgba(255,91,214,.32);
    }
    .btn.selected{
      background: rgba(255,91,214,.14);
      border-color: rgba(255,91,214,.58);
      box-shadow: 0 0 0 1px rgba(255,91,214,.16) inset, 0 0 22px rgba(255,91,214,.18);
      transform:none;
    }

    .nav{ display:flex; justify-content:space-between; gap:12px; margin-top:16px; }
    .navRight{ display:flex; gap:10px; }

    .pill{
      cursor:pointer;
      padding:12px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: rgba(255,255,255,.88);
      font-weight:800;
      letter-spacing:.2px;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .pill:hover{
      transform: translateY(-1px);
      border-color: rgba(255,91,214,.35);
      background: rgba(255,255,255,.06);
    }
    .pill:disabled{ opacity:.45; cursor:not-allowed; transform:none; }
    .ghost{ background: transparent; }

    .pillPink{
      border-color: rgba(255,91,214,.40);
      background: rgba(255,91,214,.18);
      box-shadow: 0 0 0 1px rgba(255,91,214,.10) inset, 0 10px 40px rgba(255,91,214,.10);
    }
    .pillPink:hover{
      border-color: rgba(255,91,214,.65);
      background: rgba(255,91,214,.24);
    }

    .resultsTitle{
      margin:0 0 10px;
      font-size: clamp(20px, 2.4vw, 28px);
      line-height:1.2;
      color: rgba(255,255,255,.94);
    }
    .resultsSub{
      margin:0 0 14px;
      color: var(--muted);
      line-height:1.45;
      font-size:14px;
    }

    .pairList{ display:grid; gap:12px; margin-top:12px; }
    .pair{
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      padding:14px;
    }
    .pairTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:10px;
    }
    .pairName{ font-weight:900; letter-spacing:.2px; }
    .lvl{
      display:inline-flex;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      font-size:12px;
      white-space:nowrap;
    }
    .lvl b{ color: var(--pink2); }

    .signalNote{
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,.66);
      line-height: 1.45;
    }

    .codeRow{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      gap:10px;
      align-items:stretch;
    }
    @media (max-width: 760px){
      .codeRow{ grid-template-columns: 1fr; }
      .arrow{ display:none; }
    }

    .currentBox{
      border-radius:16px;
      padding:12px;
      border:1px solid var(--blueOutline);
      background: rgba(0,0,0,.18);
      box-shadow: 0 0 0 1px rgba(120,205,255,.10) inset, 0 0 24px var(--blueGlow);
      min-height:74px;
    }
    .updateBox{
      border-radius:16px;
      padding:12px;
      border:1px solid rgba(255,91,214,.34);
      background: rgba(0,0,0,.18);
      box-shadow: 0 0 0 1px rgba(255,91,214,.10) inset, 0 0 22px rgba(255,91,214,.12);
      min-height:74px;
    }
    .label{
      font-size:12px;
      color: rgba(255,255,255,.70);
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.18px;
    }
    .text{ font-size:14px; line-height:1.45; }

    .arrow{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 4px;
      color: rgba(255,255,255,.86);
      font-weight:900;
      font-size: 18px;
      text-shadow: 0 0 18px rgba(255,91,214,.14);
      user-select:none;
    }

    .methods{
      margin-top: 14px;
      display:grid;
      gap:10px;
    }
    .method{
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      padding: 12px;
    }
    .methodTitle{
      font-weight: 900;
      margin: 0 0 6px;
      letter-spacing:.2px;
    }
    .methodText{
      margin: 0;
      color: rgba(255,255,255,.70);
      line-height:1.5;
      font-size: 13px;
      white-space: pre-line;
    }
    .strong{
      border-color: rgba(255,91,214,.22);
      box-shadow: 0 0 0 1px rgba(255,91,214,.08) inset;
    }

    .ctaRow{ display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }

    .smallNote{
      margin-top:12px;
      font-size:12px;
      color: rgba(255,255,255,.66);
      line-height:1.5;
    }

    .mantraBlock{
      margin-top: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.14);
      padding: 14px;
    }
    .mantraTitle{
      margin: 0 0 8px;
      font-weight: 900;
      color: rgba(255,255,255,.92);
      letter-spacing: .2px;
      font-size: 15px;
    }
    .mantraText{
      margin: 0;
      color: rgba(255,255,255,.74);
      line-height: 1.6;
      font-size: 13px;
      white-space: pre-line;
    }
  </style>
</head>

  <script>
    window.addEventListener("DOMContentLoaded", () => {

      /********************************************************
       * ✅ RAIN — lighter + less visible
       * - ONLY left + right
       * - center clean
       * - stops at 60% height
       ********************************************************/
      (function matrixRainSides60(){
        const c = document.getElementById("matrix");
        if(!c) return;
        const ctx = c.getContext("2d", { alpha:true });

        const chars = "01234567890123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let w, h, cols, drops, speeds, fontSize, activeCols, maxY;

        function computeActiveCols(){
          activeCols = [];
          const leftMax = Math.floor(cols * 0.18);
          const rightMin = Math.floor(cols * 0.82);
          for(let i=0; i<cols; i++){
            if(i <= leftMax || i >= rightMin) activeCols.push(i);
          }
        }

        function resize(){
          const dpr = Math.max(1, window.devicePixelRatio || 1);
          w = c.width = Math.floor(window.innerWidth * dpr);
          h = c.height = Math.floor(window.innerHeight * dpr);
          c.style.width = window.innerWidth + "px";
          c.style.height = window.innerHeight + "px";

          maxY = Math.floor(h * 0.60);
          fontSize = Math.max(16, Math.floor(20 * dpr));
          cols = Math.floor(w / fontSize);

          drops = new Array(cols).fill(0).map(() => Math.random() * (maxY / fontSize));
          speeds = new Array(cols).fill(0).map(() => 0.07 + Math.random() * 0.08); // slow
          computeActiveCols();

          ctx.font = `${fontSize}px ui-monospace, Menlo, Consolas, monospace`;
        }

        function draw(){
          // stronger fade = lighter overall rain
          ctx.fillStyle = "rgba(5,10,31,0.46)";
          ctx.fillRect(0, 0, w, h);

          for(let k=0; k<activeCols.length; k++){
            const i = activeCols[k];
            const x = i * fontSize;
            const y = drops[i] * fontSize;

            const alpha = 0.35 + Math.random()*0.20; // lower alpha
            const ch = chars[Math.floor(Math.random()*chars.length)];

            ctx.fillStyle = `rgba(255, 140, 220, ${alpha})`;
            ctx.fillText(ch, x, y);

            // less density than before
            if(Math.random() < 0.30){
              const ch2 = chars[Math.floor(Math.random()*chars.length)];
              ctx.fillStyle = `rgba(255, 180, 235, ${alpha * 0.55})`;
              ctx.fillText(ch2, x, y - fontSize * (1 + Math.random()*1.2));
            }

            drops[i] += speeds[i];

            if(y >= maxY){
              drops[i] = 0;
              if(Math.random() < 0.7) drops[i] = Math.random() * 2.5;
            }
          }

          requestAnimationFrame(draw);
        }

        window.addEventListener("resize", resize, { passive:true });
        resize();
        draw();
      })();

        // answer buttons
        if(btn.classList.contains("btn") && btn.dataset.i != null){
          answers[step] = Number(btn.dataset.i);
          render();
          return;
        }

        // nav buttons
        if(btn.id === "backBtn"){
          if(step > 0){
            step -= 1;
            render();
          } else {
            // If we're on the first question, go back to the index page
            window.location.href = "index.html";
          }
          return;
        }

        if(btn.id === "skipBtn"){
          answers[step] = null;
          step = Math.min(QUESTIONS.length, step + 1);
          render();
          return;
        }

        if(btn.id === "nextBtn"){
          if(answers[step] == null) return;
          step = Math.min(QUESTIONS.length, step + 1);
          render();
          return;
        }

        if(btn.id === "retakeBtn"){
          step = 0;
          answers = new Array(QUESTIONS.length).fill(null);
          render();
          return;
        }
      });

      function computeScores(){
        const scores = {};
        Object.keys(CODES).forEach(k => scores[k] = 0);

        for(let i=0;i<answers.length;i++){
          const chosen = answers[i];
          if(chosen == null) continue;
          const w = QUESTIONS[i].a[chosen].w || {};
          for(const code in w) scores[code] += w[code];
        }
        return scores;
      }

      function levelFromScore(s){
        if(s >= 9) return "high";
        if(s >= 5) return "medium";
        if(s >= 2) return "low";
        return "trace";
      }

      function render(){
        if(step < QUESTIONS.length) renderQuestion();
        else renderResults();
      }

      function renderQuestion(){
        const q = QUESTIONS[step];
        const filled = answers.filter(v => v !== null).length;
        const pct = Math.round((filled / QUESTIONS.length) * 100);

        app.innerHTML = `
          <div class="progress">
            <div class="bar"><div style="width:${pct}%"></div></div>
            <div class="count">${filled}/${QUESTIONS.length}</div>
          </div>

          <div class="q">${q.q}</div>
          <div class="hint">Pick what feels true. Don’t overthink it.</div>

          <div class="answers">
            ${q.a.map((opt, i) => {
              const sel = (answers[step] === i) ? "selected" : "";
              return `<button class="btn ${sel}" data-i="${i}" type="button">${opt.t}</button>`;
            }).join("")}
          </div>

          <div class="nav">
            <button class="pill ghost" id="backBtn" type="button">Back</button>
            <div class="navRight">
              <button class="pill ghost" id="skipBtn" type="button">Skip</button>
              <button class="pill" id="nextBtn" type="button" ${answers[step]===null ? "disabled" : ""}>Next</button>
            </div>
          </div>

          <div class="smallNote">No judgement. This just shows what your mind defaults to.</div>
        `;
      }

      function renderResults(){
        const scores = computeScores();

        const rankedNonZero = Object.entries(scores)
          .filter(([,v]) => v > 0)
          .sort((a,b) => b[1] - a[1])
          .slice(0, 5)
          .map(([code,val]) => ({ code, val }));

        try{
          localStorage.setItem("beliefScanTop5", JSON.stringify(
            rankedNonZero.map(item => {
              const info = CODES[item.code];
              return {
                code: item.code,
                name: info.name,
                score: item.val,
                load: levelFromScore(item.val),
                current: info.current,
                update: info.update
              };
            })
          ));
        }catch(e){}

        const mantraText = `A personalised mantra is not just music or affirmations.
It’s a frequency-based tool designed specifically for your mind and nervous system.

When you listen to your mantra daily, you will start noticing changes in your inner world — and in your reality:

- your reactions shift
- your thoughts become calmer
-situations start responding differently to you
-things feel less heavy, more aligned


🕯 An ancient practice - UPGRADED

Mantras have been used for thousands of years to influence the mind, emotions, and energy field.

The difference?

Instead of listening to generic, boring mantras from YouTube that don’t really feel like you —
you create a much stronger one, because:

- it uses your words
-your beliefs
-your emotional tone
-your music style

Your brain responds more powerfully to something that feels personal and familiar.
That’s why this works.

🎶 Sound, frequency & the brain

Sound is vibration.
Vibration affects the nervous system, brain waves, and emotional state.

When a mantra matches your natural frequency: it bypasses resistance, sinks into the subconscious

and gently rewrites beliefs running in the background of your mind

Singing along makes this effect even stronger — your breath, voice, and body sync with the new message.`;

        if(rankedNonZero.length === 0){
          app.innerHTML = `
            <h2 class="resultsTitle">Your Belief Codes</h2>
            <p class="resultsSub">Nothing strong showed up from your answers (or you skipped too many).</p>

            <div class="ctaRow">
              <button class="pill" id="retakeBtn" type="button">Retake</button>
              <a class="pill pillPink" href="mantra.html">Create your own personalised mantra</a>
            </div>

            <div class="mantraBlock">
              <p class="mantraTitle">What a personalised mantra can do for you</p>
              <p class="mantraText">${mantraText}</p>
            </div>
          `;
          return;
        }

        app.innerHTML = `
          <h2 class="resultsTitle">Your Belief Codes</h2>
          <p class="resultsSub">Here are the codes that showed up for you — <b>Current Code → Available Update</b>.</p>

          <div class="pairList">
            ${rankedNonZero.map((item, idx) => {
              const info = CODES[item.code];
              const load = levelFromScore(item.val);
              return `
                <div class="pair">
                  <div class="pairTop">
                    <div class="pairName">${idx+1}. ${info.name}</div>
                    <div class="lvl">load: <b>${load}</b> · signal: <b>${item.val}</b></div>
                  </div>

                  <div class="codeRow">
                    <div class="currentBox">
                      <div class="label">Current Code</div>
                      <div class="text">“${info.current}”</div>
                    </div>

                    <div class="arrow">→</div>

                    <div class="updateBox">
                      <div class="label">Available Update</div>
                      <div class="text">“${info.update}”</div>
                    </div>
                  </div>
                </div>
              `;
            }).join("")}
          </div>

          <div class="signalNote">If something shows <b>low</b>, it still matters — it just means it doesn’t run all the time.</div>

          <div class="methods">
            <div class="method">
              <p class="methodTitle">1) Awareness</p>
              <p class="methodText">Catch the old code when it runs and name it. That already weakens it.</p>
            </div>
            <div class="method">
              <p class="methodTitle">2) Replacement</p>
              <p class="methodText">Repeat the new code daily (written or spoken) until it feels natural.</p>
            </div>
            <div class="method strong">
              <p class="methodTitle">3) Strong method: daily listening</p>
              <p class="methodText">Daily listening (as a personalised mantra/audio) installs the new code deeper — repetition + tone reaches the unconscious mind.</p>
            </div>
          </div>

          <div class="ctaRow">
            <button class="pill" id="retakeBtn" type="button">Retake</button>
            <a class="pill pillPink" href="mantra.html">Create your own personalised mantra</a>
          </div>

          <div class="smallNote">
            Those are your unconscious codes running in the background of your mind.
            If you change them, your reality will shift dramatically as well 
          </div>

          <div class="mantraBlock">
            <p class="mantraTitle">What a personalised mantra can do for you</p>
            <p class="mantraText">${mantraText}</p>
          </div>
        `;
      }

      render();
    });
  </script>
</body>
</html>
