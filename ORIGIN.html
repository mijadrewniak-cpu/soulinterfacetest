<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SOUL ORIGIN · Scan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root{
      --bg0:#02030a;
      --bg1:#0b0f2b;

      --ink: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);

      --stroke: rgba(255,255,255,.16);
      --stroke2: rgba(255,255,255,.22);

      --pink:#ff40b0;
      --pink2:#ff8ad4;
      --cyan:#7cf5ff;
      --mint:#7bffc7;

      --shadow: 0 40px 120px rgba(0,0,0,.72);
      --r: 30px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family: var(--font);
      color: var(--ink);
      min-height:100vh;
      background: var(--bg0); /* solid dark blue */
      overflow-x:hidden;
    }

    /* --- ambient aura (hidden to make background still) --- */
    .aura{
      display:none !important;
      position: fixed;
      inset: -30%;
      pointer-events:none;
      z-index:0;
      filter: none;
      animation: none !important;
    }
    @keyframes drift{
      from{ transform: translateY(-34px) translateX(-18px) scale(1.02); opacity:.95; }
      to{ transform: translateY(34px) translateX(18px) scale(1.04); opacity:.82; }
    }

    /* --- soft floating shapes (hidden to make background still) --- */
    .shape-layer{
      display:none !important;
      position: fixed;
      inset: 0;
      pointer-events:none;
      z-index: 0;
      opacity: 0;
      mix-blend-mode: screen;
    }
    .shape{
      display:none !important;
      position:absolute;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      filter: none;
      animation: none !important;
    }
    .s1{ left:-80px; top: 18%; animation-delay:-3s; transform: scale(1.05); }
    .s2{ right:-90px; top: 10%; animation-delay:-9s; transform: scale(.95); }
    .s3{ left: 12%; bottom:-120px; animation-delay:-14s; transform: scale(1.1); opacity:.55; }
    .s4{ right: 14%; bottom:-140px; animation-delay:-6s; transform: scale(1.0); opacity:.50; }

    @keyframes floaty{
      0%{ transform: translate3d(0,0,0) scale(1); }
      50%{ transform: translate3d(24px,-28px,0) scale(1.03); }
      100%{ transform: translate3d(0,0,0) scale(1); }
    }

    /* background butterflies (hidden per request - still background) */
    .butterfly-layer {
      display: none !important;
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: none !important;
    }
    .butterfly {
      position: absolute;
      width: 26px;
      height: 18px;
      border-radius: 60% 40% 60% 20%;
      background: radial-gradient(circle at 30% 30%, #ffe6ff, var(--pink) 50%, transparent 70%);
      box-shadow: 0 0 16px rgba(255,120,220,0.9);
      opacity: 0.75;
      filter: blur(0.2px);
      animation: flutter 22s linear infinite;
    }
    .butterfly::before,
    .butterfly::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 18px;
      border-radius: 40% 60% 20% 60%;
      background: radial-gradient(circle at 70% 30%, #fff0ff, var(--pink2) 55%, transparent 75%);
      box-shadow: 0 0 12px rgba(255,120,220,0.9);
    }
    .butterfly::before { left: -18px; top: 0; transform-origin: right center; animation: wing 1.8s ease-in-out infinite; }
    .butterfly::after  { right: -18px; top: 0; transform-origin: left center;  animation: wing 1.9s ease-in-out infinite; }
    .b1 { left: 5%;  top: 75%; animation-delay: -3s; }
    .b2 { left: 20%; top: 10%; animation-delay: -9s; }
    .b3 { left: 70%; top: 15%; animation-delay: -15s; }
    .b4 { left: 85%; top: 65%; animation-delay: -1s; }
    .b5 { left: 40%; top: 50%; animation-delay: -19s; }
    @keyframes flutter {
      0%   { transform: translate3d(-10vw, 15vh, 0) scale(0.9); opacity: 0; }
      10%  { opacity: 0.8; }
      50%  { transform: translate3d(40vw, -40vh, 0) scale(1); }
      100% { transform: translate3d(90vw, 5vh, 0) scale(0.9); opacity: 0; }
    }
    @keyframes wing { 0%, 100% { transform: rotateZ(6deg); } 50% { transform: rotateZ(-12deg); } }

    /* --- layout wrapper --- */
    .wrap{
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 14px;
    }

    .shell{
      width: min(1150px, 100%); /* wider shell to allow a more rectangular panel */
      border-radius: var(--r);
      border: 1px solid var(--stroke);
      background: rgba(2,4,18,0.96); /* keep solid dark blue shell to match background */
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    /* --- top bar --- */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 18px 18px 10px;
    }
    .brand{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255,255,255,.78);
      user-select:none;
    }
    .dot{
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 14px rgba(123,255,199,.95);
    }
    .pill{
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.72);
      white-space:nowrap;
      user-select:none;
    }

    /* Dev preview UI */
    .dev-preview{
      position: relative; /* stay in document flow so it doesn't overlap content */
      margin-top: 8px;
      display:flex;
      gap:8px;
      z-index: 3;
      align-items:center;
      justify-content:flex-end;
      padding-right: 18px;
      pointer-events: auto;
    }
    .dev-preview .dev-btn{
      padding:6px 10px;
      border-radius:999px;
      background: rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      color: rgba(230,245,255,0.95);
      font-size:12px;
      cursor:pointer;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }
    .dev-preview .dev-btn:hover{
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
      background: rgba(255,255,255,0.04);
    }

    @media (max-width: 900px){
      .dev-preview{ position: static; margin-top: 10px; justify-content:flex-end; }
      .dev-preview .dev-btn{ padding:6px 8px; font-size:11px; }
    }

    /* --- pages --- */
    .page{
      padding: 0 18px 18px;
    }
    .hidden{ display:none; }

    /* --- quiz card (Purpose-like capsule + panel) --- */
    .quiz-shell{ padding: 18px; position:relative; z-index:2; margin-top:6px; }

    .layout{ display:grid; grid-template-columns:minmax(0,0.7fr) minmax(0,1.3fr); gap:48px; align-items:center; }

    /* CAPSULE + LASER */
    .capsule-wrap{ position:relative; display:flex; justify-content:center; align-items:center; padding:34px 0; }
    .capsule{ width:210px; height:260px; border-radius:46%; background: radial-gradient(circle at 50% 0%,rgba(255,255,255,0.96),transparent 52%) top/100% 50% no-repeat, radial-gradient(circle at 50% 100%,#1b2f63,#071021); box-shadow:0 0 40px rgba(130,220,255,0.9); position:relative; overflow:hidden; animation:capsuleFloat 6s ease-in-out infinite alternate; }
    .capsule-inner{ position:absolute; inset:18px; border-radius:40%; border:1px solid rgba(255,255,255,0.18); box-shadow:inset 0 0 32px rgba(0,0,0,0.7); overflow:hidden; }
    .capsule-line{ position:absolute; left:10%; right:10%; top:50%; height:1px; background:linear-gradient(90deg,transparent,#7ecbff,transparent); opacity:.7; }
    .scan-line{ position:absolute; top:8%; bottom:8%; width:3px; left:50%; transform:translateX(-50%); background:linear-gradient( to bottom, transparent 0%, rgba(163,255,255,0.0) 10%, rgba(163,255,255,0.75) 30%, rgba(255,255,255,1) 50%, rgba(163,255,255,0.75) 70%, rgba(163,255,255,0.0) 90%, transparent 100% ); box-shadow:0 0 18px rgba(163,255,255,0.9); opacity:.85; animation:scanBeam 3.4s ease-in-out infinite; }
    .capsule-orbit{ position:absolute; width:210px; height:50px; border-radius:50%; bottom:-6px; background:radial-gradient(circle at 50% 0,rgba(170,255,255,0.9),transparent 65%); filter:blur(8px); animation:orbitPulse 6s ease-in-out infinite alternate; }

    .capsule-label{ text-align:center; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:rgba(207,222,255,0.9); margin-top:10px; }
    .status-row{ display:flex; justify-content:center; gap:10px; margin-top:10px; font-size:10px; }
    .pill{ border-radius:999px; padding:4px 9px; border:1px solid rgba(126,202,255,0.6); background:rgba(10,30,55,0.85); display:flex; align-items:center; gap:6px; }
    .pill-dot{ width:7px; height:7px; border-radius:50%; background:#4dfef6; box-shadow:0 0 10px rgba(96,255,245,0.8); }

    @keyframes capsuleFloat{ 0%{transform:translateY(18px) scale(0.96);} 50%{transform:translateY(-22px) scale(1.05);} 100%{transform:translateY(12px) scale(0.98);} }
    @keyframes orbitPulse{ 0%{opacity:.7;transform:scale(0.96);} 50%{opacity:1;transform:scale(1.05);} 100%{opacity:.75;transform:scale(0.98);} }
    @keyframes scanBeam{ 0%{transform:translate(-50%,-60%);} 50%{transform:translate(-50%,55%);} 100%{transform:translate(-50%,-60%);} }

    .panel{ border-radius:12px; border:1px solid rgba(164,192,255,0.5); background: linear-gradient(180deg,#041025,#020611); box-shadow:0 0 26px rgba(0,0,0,0.78); padding:22px 26px 20px; min-height:460px; }
    .q-header{ display:flex; justify-content:space-between; align-items:center; font-size:12px; color:rgba(199,216,252,0.85); margin-bottom:10px; }
    .q-title{ font-size:16px; margin-bottom:12px; }

    /* question spacing and panel body breathing room */
    .question-text{ font-size:18px; line-height:1.45; color:#ffffff; margin-bottom:24px; font-weight:600; }
    .panel-body{ padding-top:14px; }

    .answers{ display:flex; flex-direction:column; gap:14px; margin-bottom:18px; }
    .answer{ border-radius:999px; border:1px solid rgba(136,162,227,0.55); padding:12px 14px; font-size:14px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:background .12s ease,border-color .12s ease; background:transparent; color:#ffffff; }
    .answer .label{ display:block; width:28px; height:28px; font-weight:700; color:#ffffff; display:inline-flex; align-items:center; justify-content:center; border-radius:999px; background: rgba(10,20,30,0.26); }
    .answer span{ color:#ffffff; }
    .answer:hover{ border-color:rgba(184,210,255,0.95); background:rgba(120,163,255,0.06); }
    .answer.selected{ background: radial-gradient(circle at 0 0, rgba(86,255,246,0.06), transparent 40%); border-color: rgba(86,255,246,0.9); }

    .nav{ display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
    .btn-small{ border-radius:999px; border:1px solid rgba(160,185,245,0.65); background:transparent; color:rgba(221,233,255,0.9); padding:7px 14px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; }
    .btn-small.primary{ border:none; background:radial-gradient(circle at 0 0,#56fff6,#13d3ff); color:#021019; box-shadow:0 0 20px rgba(106,255,243,0.85); }
    .hint{ font-size:11px; color:rgba(184,201,238,0.8); margin-top:10px; }

    /* RESULT-TYPE DECORATIONS (richer backgrounds and patterns) */
    .result-shell.result-earth::before{
      content:""; position:absolute; inset:-20%;
      background:
        radial-gradient(circle at 20% 25%, rgba(120,230,150,0.16), transparent 20%),
        radial-gradient(circle at 70% 70%, rgba(80,190,130,0.08), transparent 28%),
        repeating-radial-gradient(circle at 40% 40%, rgba(140,255,190,0.03) 0 2px, transparent 2px 8px);
      filter: blur(36px);
      pointer-events:none; z-index:0; opacity:1;
    }
    .result-shell.result-earth::after{
      content:""; position:absolute; inset:0; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='120'><g fill='%231a6b3a' opacity='0.12'><ellipse cx='40' cy='80' rx='32' ry='14'/><ellipse cx='140' cy='60' rx='28' ry='10'/><ellipse cx='200' cy='80' rx='20' ry='8'/></g></svg>"); background-repeat: repeat; opacity:0.55; mix-blend-mode:overlay; filter: blur(6px) saturate(1.2); pointer-events:none; z-index:0;
    }

    .result-shell.result-ocean::before{
      content:""; position:absolute; inset:-22%;
      background:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='120' viewBox='0 0 800 120'><g fill='none' stroke='%230b7fae' stroke-opacity='0.14' stroke-width='12' stroke-linecap='round'><path d='M0 70 C80 40 160 100 240 70 C320 40 400 100 480 70 C560 40 640 100 720 70 C800 40 880 100 960 70'/></g></svg>") repeat-x,
        repeating-linear-gradient(180deg, rgba(16,160,180,0.08) 0 8px, rgba(28,190,210,0.06) 8px 16px),
        radial-gradient(circle at 50% 40%, rgba(40,180,220,0.12), transparent 30%),
        radial-gradient(circle at 72% 30%, rgba(255,190,90,0.10), transparent 40%);
      background-size: auto 56px, auto, cover, cover;
      filter: blur(28px) saturate(1.06);
      pointer-events:none; z-index:0; animation: oceanWave 9s linear infinite;
    }

    /* Ocean hologram (blue) */
    .result-shell.result-ocean .ocean-grid{ display:grid; grid-template-columns: 1fr 300px; gap:18px; align-items:start; }
    .result-shell.result-ocean .ocean-holo{ display:flex; align-items:center; justify-content:center; }
    .result-shell.result-ocean .holo-wrap{ position:relative; display:flex; justify-content:center; align-items:center; padding:8px 0; }
    .result-shell.result-ocean .holo{ width:240px; height:300px; border-radius:50% / 56%; position:relative; overflow:hidden; background:
      radial-gradient(circle at 50% 84%, rgba(14,116,144,0.95), transparent 58%),
      radial-gradient(circle at 32% 20%, rgba(8,76,97,0.85), transparent 60%),
      radial-gradient(circle at 72% 22%, rgba(6,95,134,0.78), transparent 60%),
      radial-gradient(circle at 52% 56%, rgba(20,184,230,0.40), transparent 62%),
      radial-gradient(circle at 50% 50%, rgba(190,220,240,0.28), rgba(4,10,24,0.70) 78%);
    box-shadow:
      0 0 110px rgba(14,116,144,0.70),
      0 0 170px rgba(8,76,97,0.55),
      0 0 190px rgba(6,95,134,0.50);
    animation: soulFloat 10s ease-in-out infinite; filter: saturate(1.10) brightness(1.02);
    }
    .result-shell.result-ocean .holo::before{ content:""; position:absolute; inset:0; background:
      radial-gradient(circle at 35% 35%, rgba(160,210,255,0.14), transparent 60%),
      radial-gradient(circle at 70% 40%, rgba(190,235,255,0.12), transparent 62%),
      radial-gradient(circle at 50% 78%, rgba(170,240,255,0.16), transparent 60%);
      opacity:0.85; mix-blend-mode: normal; animation: driftSoft 14s cubic-bezier(.45,0,.2,1) infinite alternate;
    }
    .result-shell.result-ocean .holo::after{ content:""; position:absolute; inset:11%; border-radius:50% / 60%; border:1px solid rgba(220,240,255,0.12); opacity:0.6; }
    .result-shell.result-ocean .holo-spark{ position:absolute; width:7px; height:7px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,1), rgba(255,255,255,0) 70%); box-shadow:0 0 16px rgba(180,220,255,0.9); opacity:0.9; mix-blend-mode:screen; animation: floatInner 9s ease-in-out infinite; }
    .result-shell.result-ocean .holo-spark.s1{ left:30%; top:32%; animation-delay:-2s; }
    .result-shell.result-ocean .holo-spark.s2{ left:62%; top:44%; animation-delay:1.4s; }
    .result-shell.result-ocean .holo-spark.s3{ left:46%; top:24%; animation-delay:3.6s; }
    .result-shell.result-ocean .orbit{ position:absolute; width:200px; height:54px; border-radius:50%; bottom:-10px; left:50%; transform:translateX(-50%); background:radial-gradient(circle at 50% 0, rgba(34,211,238,0.95), rgba(14,165,183,0.40) 45%, transparent 80%); filter:blur(12px); opacity:0.95; mix-blend-mode:screen; pointer-events:none; }

    /* Shared holo base (sparks, motion) */
    .result-shell .holo{ width:240px; height:300px; border-radius:50% / 56%; position:relative; overflow:hidden; animation: soulFloat 10s ease-in-out infinite; filter: saturate(1.02) brightness(1.02); }
    .result-shell .holo::before{ content:""; position:absolute; inset:0; background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.08), transparent 48%), radial-gradient(circle at 70% 40%, rgba(255,255,255,0.04), transparent 50%); opacity:0.9; mix-blend-mode: normal; animation: driftSoft 14s cubic-bezier(.45,0,.2,1) infinite alternate; }
    .result-shell .holo::after{ content:""; position:absolute; inset:11%; border-radius:50% / 60%; border:1px solid rgba(255,255,255,0.12); opacity:0.6; }
    .result-shell .holo-spark{ position:absolute; width:7px; height:7px; border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,1), rgba(255,255,255,0) 70%); box-shadow:0 0 16px rgba(255,255,255,0.75); opacity:0.9; mix-blend-mode:screen; animation: floatInner 9s ease-in-out infinite; }
    .result-shell .holo-spark.s1{ left:30%; top:32%; animation-delay:-2s; }
    .result-shell .holo-spark.s2{ left:62%; top:44%; animation-delay:1.4s; }
    .result-shell .holo-spark.s3{ left:46%; top:24%; animation-delay:3.6s; }

    /* Earth hologram (green) */
    .result-shell.result-earth .holo{ background: radial-gradient(circle at 50% 84%, rgba(150,220,160,0.95), transparent 58%), radial-gradient(circle at 32% 20%, rgba(200,240,200,0.72), transparent 60%); box-shadow: 0 0 110px rgba(110,200,120,0.55), 0 0 170px rgba(160,230,160,0.30); filter:saturate(1.06); }

    /* Animal hologram (brown) */
    .result-shell.result-animal .holo{ background: radial-gradient(circle at 50% 84%, rgba(210,180,140,0.95), transparent 58%), radial-gradient(circle at 32% 20%, rgba(190,160,120,0.64), transparent 60%); box-shadow: 0 0 110px rgba(200,150,90,0.40), 0 0 170px rgba(180,130,80,0.30); }

    /* Tech hologram (purple) */
    .result-shell.result-tech .holo{ background: radial-gradient(circle at 50% 84%, rgba(200,150,255,0.95), transparent 58%), radial-gradient(circle at 32% 20%, rgba(170,120,240,0.72), transparent 60%); box-shadow: 0 0 110px rgba(160,100,240,0.50), 0 0 170px rgba(210,160,255,0.30); }

    /* Dimensional hologram (rainbow) */
    .result-shell.result-dimensional .holo{ background: linear-gradient(90deg,#ffd1f8,#c3b0ff 35%, #a0e0ff 70%); box-shadow: 0 0 140px rgba(200,160,255,0.22), 0 0 200px rgba(160,200,255,0.12); }

    /* per-type grid for holo placement */
    .result-shell.result-earth .earth-grid,
    .result-shell.result-tech .tech-grid,
    .result-shell.result-dimensional .dimensional-grid,
    .result-shell.result-animal .animal-grid{ display:grid; grid-template-columns: 1fr 300px; gap:18px; align-items:start; }

    /* per-type primary button colors */
    .result-shell.result-earth .result-controls .btn-main{ border:none; background: linear-gradient(90deg,#3ad07a,#1f7a3e); color:#fff; box-shadow: 0 10px 34px rgba(30,140,80,0.16); }
    .result-shell.result-tech .result-controls .btn-main{ border:none; background: linear-gradient(90deg,#a070ff,#6e48d9); color:#fff; box-shadow: 0 10px 34px rgba(120,80,220,0.16); }
    .result-shell.result-dimensional .result-controls .btn-main{ border:none; background: linear-gradient(90deg,#ffd1f8,#c3b0ff); color:#fff; box-shadow: 0 10px 34px rgba(180,120,240,0.10); }

    /* per-type badge tweaks */
    .result-shell.result-earth .badge{ box-shadow: 0 10px 36px rgba(30,150,80,0.14); background: linear-gradient(180deg,#aef6c8,#58c07f); color:#fff; border: 1px solid rgba(255,255,255,0.06); padding:10px 18px; font-weight:800; border-radius:12px; }
    .result-shell.result-tech .badge{ box-shadow: 0 10px 36px rgba(160,100,240,0.14); background: linear-gradient(180deg,#d5b7ff,#a277f0); color:#fff; border:1px solid rgba(255,255,255,0.06); padding:10px 18px; font-weight:800; border-radius:12px; }
    .result-shell.result-dimensional .badge{ box-shadow: 0 10px 36px rgba(180,120,240,0.16); background: linear-gradient(90deg,#ffd1f8,#c3b0ff 40%, #a0e0ff 80%); color:#fff; border:1px solid rgba(255,255,255,0.06); padding:10px 18px; font-weight:800; border-radius:12px; }

    /* Ocean sections: rectangular cards (now darker blue theme) */
    .result-shell.result-ocean .ocean-sections{ position:relative; z-index:1; display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:12px; margin-top:12px; align-items:start; }

    /* subtle light wash behind the cards */
    .result-shell.result-ocean .ocean-sections::before{
      content:""; position:absolute; inset:-8% -6% -6% -6%; z-index:0; pointer-events:none;
      background: radial-gradient(circle at 24% 24%, rgba(255,255,255,0.06), transparent 12%), radial-gradient(circle at 76% 68%, rgba(200,240,255,0.04), transparent 20%);
      filter: blur(18px) saturate(1.02);
    }

    .result-shell.result-ocean .ocean-section{ position:relative; z-index:2; padding:18px; border-radius:12px; box-shadow: 0 12px 36px rgba(6,20,40,0.20); display:flex; flex-direction:column; gap:12px; min-height:150px; overflow:hidden; transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; color:#ffffff; border:1px solid rgba(255,255,255,0.04); background: linear-gradient(180deg, rgba(6,58,78,0.96), rgba(10,84,104,0.96)); }

    /* CORE - deep midnight blue */
    .result-shell.result-ocean .ocean-section.section-core{
      background: linear-gradient(180deg,#064b5e,#0a6e78);
      border: 1px solid rgba(110,170,230,0.06);
      color:#ffffff;
      border-radius: 18px 8px 18px 8px;
      clip-path: polygon(0 0, 100% 0, 100% 86%, 86% 100%, 0 100%);

        btn.appendChild(labelSpan);
        btn.appendChild(textSpan);

        btn.addEventListener("click", () => {
          Array.from(answersDiv.children).forEach(el => el.classList.remove("selected"));
          btn.classList.add("selected");
          nextBtn.disabled = false;
          nextBtn.dataset.tieType = ans.type;
        });

        answersDiv.appendChild(btn);
      });

      questionContainer.appendChild(answersDiv);

      backBtn.disabled = true;
      nextBtn.textContent = "Show my result →";
      nextBtn.disabled = true;
    }

    function calculateResult(){
      const counts = { earth:0, ocean:0, dimensional:0, animal:0, tech:0 };

      answers.forEach((ansIndex, qIndex) => {
        if (ansIndex === null) return;
        const type = questions[qIndex].answers[ansIndex].type;
        counts[type]++;
      });

      let max = -1;
      let maxTypes = [];

      TYPES.forEach(t => {
        const c = counts[t];
        if (c > max){
          max = c;
          maxTypes = [t];
        } else if (c === max){
          maxTypes.push(t);
        }
      });

      if (maxTypes.length > 1){
        renderTieBreaker(maxTypes);
      } else {
        showResult(maxTypes[0] || "earth");
      }
    }

    function showResult(type){
      // IMPORTANT: results HTML is not changed (we render exactly your resultsContent[type])
      resultDiv.innerHTML = resultsContent[type];

      // decorate the result panel for the selected type
      const rs = document.querySelector('.result-shell');
      rs.classList.remove('result-earth','result-ocean','result-dimensional','result-animal','result-tech');
      rs.classList.add('result-'+type);

      showResultPage();
      attachCardHoverHandlers();
    }



    // attach hover listeners so card hover can dim the holo (adds/removes .card-hover on .result-shell)
    function attachCardHoverHandlers(){
      const rs = document.querySelector('.result-shell');
      if (!rs) return;
      rs.querySelectorAll('.card, .animal-section, .ocean-section, .earth-section, .tech-section, .dimensional-section').forEach(el=>{
        el.addEventListener('mouseenter', ()=> rs.classList.add('card-hover'));
        el.addEventListener('mouseleave', ()=> rs.classList.remove('card-hover'));
        el.addEventListener('touchstart', ()=> rs.classList.add('card-hover'));
        el.addEventListener('touchend', ()=> rs.classList.remove('card-hover'));
      });
    }

    // --- events ---
    backBtn.addEventListener("click", () => {
      if(currentIndex === 0){
        window.location.href = "index.html";
        return;
      }
      else if (!inTieBreaker && currentIndex > 0){
        currentIndex--;
        renderQuestion();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (inTieBreaker){
        const tieType = nextBtn.dataset.tieType;
        if (!tieType) return;
        showResult(tieType);
        return;
      }

      if (answers[currentIndex] === null) return;

      if (currentIndex < questions.length - 1){
        currentIndex++;
        renderQuestion();
      } else {
        calculateResult();
      }
    });

    retakeBtn.addEventListener("click", () => {
      currentIndex = 0;
      answers = new Array(questions.length).fill(null);
      inTieBreaker = false;
      showQuizPage();
    });

    backToQuizBtn.addEventListener("click", () => {
      // go back to last answered question for review
      showQuizPage();
    });

    // init
    showQuizPage();

    // Dev preview handlers + shortcut (press 'D' to toggle visibility)
    (function(){
      const dev = document.getElementById('dev-preview');
      if(!dev) return;

      dev.addEventListener('click', (ev)=>{
        const btn = ev.target.closest('.dev-btn');
        if(!btn) return;
        const type = btn.dataset.type;
        if(type && ['earth','ocean','dimensional','animal','tech'].includes(type)){
          showResult(type);
          return;
        }
        if(btn.id === 'dev-back'){
          showQuizPage();
          return;
        }
      });

      // keyboard shortcut: D to toggle visibility
      let visible = true;
      document.addEventListener('keydown', (ev)=>{
        if(ev.key.toLowerCase() === 'd' && (ev.ctrlKey||ev.metaKey||ev.shiftKey) === false){
          visible = !visible;
          dev.style.display = visible ? 'flex' : 'none';
        }
      });
    })();

    // Quick preview mode: open ORIGIN.html?preview=earth (or ocean/dimensional/animal/tech)
    (function(){
      try{
        const params = new URLSearchParams(location.search);
        const p = params.get('preview') || (location.hash ? location.hash.slice(1) : null);
        if(p && ['earth','ocean','dimensional','animal','tech'].includes(p)){
          console.log('Preview mode:', p);
          setTimeout(()=> showResult(p), 350);
        }
      }catch(e){ /* ignore */ }
    })();
  </script>
</body>
</html>
